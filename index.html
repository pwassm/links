<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>linkk</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; touch-action: manipulation; background: #000; }
#rotateWrap { position: fixed; top: 0; left: 0; }
#gameCanvas { display: block; }
#menuWrap { position: fixed; z-index: 999; width: 48px; height: 48px; }
#menuWrap.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
#menuBtn {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(30,30,30,0.82); border: none; border-radius: 10px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; padding: 10px; touch-action: manipulation;
}
#menuBtn.open { background: rgba(30,30,30,0.97); }
#menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }
#menuPanel {
  position: absolute; bottom: 54px; right: 0; z-index: 998;
  background: rgba(25,25,25,0.96); border-radius: 10px;
  overflow-y: auto; max-height: 80vh;
  display: none; flex-direction: column; min-width: 200px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
#menuPanel.open { display: flex; }
#menuDateStamp {
  padding: 6px 12px 2px 12px; font: 10px Arial, sans-serif;
  color: rgba(255,255,255,0.35); text-align: right; user-select: none;
}
.menu-item {
  padding: 13px 18px; color: #fff; font: 15px Arial, sans-serif;
  cursor: pointer; white-space: nowrap;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; }
/* ── Image Manager overlay ── */
#vmOverlay {
  display: none; position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.88); flex-direction: column;
  font-family: Arial, sans-serif; color: #fff;
}
#vmOverlay.open { display: flex; }
#vmHeader {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; background: #1a1a2e;
  border-bottom: 1px solid #333; flex-wrap: wrap; flex-shrink: 0;
}
#vmHeader h2 { font-size: 16px; color: #8ef; margin-right: 6px; }
#vmAdminBadge {
  display: none; padding: 3px 10px; border-radius: 12px;
  background: #3a1a0a; border: 1px solid #f80; color: #fc8; font-size: 11px; font-weight: bold;
}
#vmAdminBadge.visible { display: inline-block; }
.vm-tab {
  padding: 5px 14px; border-radius: 6px; cursor: pointer;
  background: #2a2a3e; border: 1px solid #444; font-size: 13px; color: #ccc;
}
.vm-tab.active { background: #3a5a8a; border-color: #8ef; color: #fff; }
.vm-tab:hover  { background: #3a3a5e; }
#vmToolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: #111122;
  border-bottom: 1px solid #333; flex-wrap: wrap; flex-shrink: 0;
}
.vm-btn {
  padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px;
  border: 1px solid #555; background: #2a2a3e; color: #ddd; white-space: nowrap;
}
.vm-btn:hover  { background: #3a3a5e; border-color: #8ef; color: #fff; }
.vm-btn.danger { border-color: #f55; color: #f88; }
.vm-btn.danger:hover  { background: #3e1a1a; }
.vm-btn.success { border-color: #5f5; color: #afa; }
.vm-btn.success:hover { background: #1a3e1a; }
.vm-btn:disabled { opacity: 0.35; cursor: not-allowed; }
#vmSelInfo { margin-left: auto; font-size: 12px; color: #888; white-space: nowrap; }
#vmTableWrap {
  flex: 1; overflow: auto;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#vmTableWrap::-webkit-scrollbar { width: 7px; height: 7px; }
#vmTableWrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 4px; }
#vmTable { border-collapse: collapse; width: 100%; font-size: 13px; }
#vmTable th {
  position: sticky; top: 0; background: #1e1e3a; color: #8ef;
  padding: 8px 10px; text-align: left; white-space: nowrap;
  border-bottom: 2px solid #444; user-select: none; z-index: 2;
  overflow: hidden; text-overflow: ellipsis;
}
#vmTable th { position: relative; }
#vmTable th.sortable { cursor: pointer; }
#vmTable th.sortable:hover { background: #2a2a5a; }
#vmTable th.sort-asc::after  { content: " ▲"; font-size: 10px; }
#vmTable th.sort-desc::after { content: " ▼"; font-size: 10px; }
.vm-resize-handle {
  position: absolute; right: 0; top: 0; bottom: 0; width: 6px;
  cursor: col-resize; border-right: 2px solid transparent;
}
.vm-resize-handle:hover, .vm-resize-handle.resizing { border-right-color: #8ef; }
#vmTable td {
  padding: 6px 10px; border-bottom: 1px solid #222;
  vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#vmTable tr.vm-row { cursor: pointer; }
#vmTable tr.vm-row:hover td { background: rgba(255,255,255,0.05); }
#vmTable tr.vm-row.selected td { background: rgba(58,90,138,0.55); }
#vmTable td.editable { cursor: pointer; }
#vmTable td.editable:hover { background: rgba(100,200,255,0.08) !important; outline: 1px dashed #8ef4; }
#vmTable td.locked { cursor: default; color: #666; }
#vmTable input.vm-cell-input {
  background: #0a0a1a; border: 1px solid #8ef; color: #fff;
  padding: 2px 5px; border-radius: 3px; font-size: 13px; width: 100%;
}
.vm-img-link { color: #8ef; text-decoration: underline; font-size: 12px; }
#vmTable td.loc-cell { cursor: cell; color: #fc8; font-weight: bold; }
#vmTable td.loc-cell:hover { background: rgba(255,200,50,0.12) !important; outline: 1px dashed #fc8; }
.vm-disp-y { color: #4f4; font-weight: bold; cursor: pointer; }
.vm-disp-n { color: #666; cursor: pointer; }
/* Field chips */
#vmFieldPanel {
  display: none; padding: 14px 18px; background: #111122;
  border-top: 1px solid #333; flex-wrap: wrap; gap: 8px; flex-shrink: 0;
}
#vmFieldPanel.open { display: flex; align-items: flex-start; }
#vmFieldPanel h3 { width: 100%; font-size: 14px; color: #fc8; margin-bottom: 4px; }
.vm-field-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px; font-size: 12px;
  border: 1px solid #555; background: #2a2a3e; color: #ddd;
  cursor: grab; user-select: none;
}
.vm-field-chip.active-field { border-color: #5f5; color: #afa; background: #1a3a1a; }
.vm-field-chip .chip-toggle { cursor: pointer; font-size: 14px; }
.vm-field-chip.dragging  { opacity: 0.4; }
.vm-field-chip.drag-over { border-color: #fc8; background: #3a2a0a; }
.chip-width-input {
  width: 42px; background: #0a0a1a; border: 1px solid #555; color: #ccc;
  padding: 1px 4px; border-radius: 3px; font-size: 11px; text-align: center;
}
#vmAddFieldRow {
  display: none; padding: 8px 14px; background: #0e0e1e;
  border-bottom: 1px solid #333; flex-shrink: 0;
  align-items: center; gap: 8px; flex-wrap: wrap;
}
#vmAddFieldRow.open { display: flex; }
#vmAddFieldRow label { font-size: 12px; color: #fc8; }
#vmAddFieldRow input, #vmAddFieldRow select {
  background: #0a0a1a; border: 1px solid #555; color: #fff;
  padding: 4px 8px; border-radius: 5px; font-size: 12px;
}
#vmBackupPanel {
  display: none; padding: 8px 14px; background: #0e0e1e;
  border-bottom: 1px solid #333; flex-shrink: 0;
  align-items: center; gap: 8px; flex-wrap: wrap;
}
#vmBackupPanel.open { display: flex; }
#vmBackupPanel label { font-size: 12px; color: #fc8; }
#vmBackupList {
  background: #0a0a1a; border: 1px solid #444; color: #fff;
  padding: 3px 8px; border-radius: 5px; font-size: 12px; min-width: 220px;
}
#vmLoginModal {
  display: none; position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
}
#vmLoginModal.open { display: flex; }
#vmLoginBox {
  background: #1a1a2e; border: 1px solid #555; border-radius: 12px;
  padding: 28px 32px; min-width: 280px; display: flex; flex-direction: column; gap: 14px;
}
#vmLoginBox h3 { color: #8ef; font-size: 15px; }
.vm-login-row { display: flex; flex-direction: column; gap: 4px; }
.vm-login-row label { font-size: 12px; color: #aaa; }
.vm-login-row input {
  background: #0a0a1a; border: 1px solid #555; color: #fff;
  padding: 7px 10px; border-radius: 6px; font-size: 14px;
}
.vm-login-row input:focus { border-color: #8ef; outline: none; }
#vmLoginError { color: #f66; font-size: 12px; min-height: 16px; }
.vm-login-btns { display: flex; gap: 8px; justify-content: flex-end; }
#vmNameModal {
  display: none; position: fixed; inset: 0; z-index: 3100;
  background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
}
#vmNameModal.open { display: flex; }
#vmNameBox {
  background: #1a1a2e; border: 1px solid #555; border-radius: 12px;
  padding: 24px 28px; min-width: 280px; display: flex; flex-direction: column; gap: 12px;
}
#vmNameBox h3 { color: #8ef; font-size: 14px; }
#vmNameInput {
  background: #0a0a1a; border: 1px solid #555; color: #fff;
  padding: 7px 10px; border-radius: 6px; font-size: 14px;
}
#vmNameInput:focus { border-color: #8ef; outline: none; }
.vm-name-btns { display: flex; gap: 8px; justify-content: flex-end; }
#vmStatus {
  padding: 5px 14px; font-size: 11px; color: #888;
  background: #0a0a1a; border-top: 1px solid #222; flex-shrink: 0;
  display: flex; justify-content: space-between;
}
#vmStatus span { color: #afa; }
</style>
</head>
<body>

<div id="rotateWrap"><canvas id="gameCanvas"></canvas></div>

<!-- Hamburger menu -->
<div id="menuWrap">
  <div id="menuPanel">
    <div id="menuDateStamp"></div>
    <div class="menu-item" id="miPlay">Play</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miTables">Tables  <span style="font-size:10px;opacity:.5">Ctrl-T</span></div>
    <div class="menu-item" id="miHelp">Help</div>
  </div>
  <button id="menuBtn"><span></span><span></span><span></span></button>
</div>

<!-- Image Manager Overlay -->
<div id="vmOverlay">
  <div id="vmHeader">
    <h2>&#128247; linkk Image Manager</h2>
    <span id="vmAdminBadge">&#9881; Admin</span>
    <div id="vmTabs"></div>
    <button class="vm-btn" id="vmAdminLoginBtn">&#128274; Admin</button>
    <button class="vm-btn danger" id="vmAdminLogoutBtn" style="display:none">&#128275; Logout</button>
    <button class="vm-btn" id="vmCloseBtn" style="margin-left:auto">&#x2715; Close</button>
  </div>
  <div id="vmToolbar">
    <button class="vm-btn success" id="vmAddRowBtn" disabled>&#xFF0B; Row</button>
    <button class="vm-btn success" id="vmExportBtn" disabled>&#8595; Export JSON</button>
    <button class="vm-btn" id="vmBackupBtn" disabled>&#128194; Backups</button>
    <button class="vm-btn danger" id="vmResetBtn" disabled>&#8634; Reset</button>
    <button class="vm-btn" id="vmFieldToggleBtn" disabled>&#9881; Fields</button>
    <button class="vm-btn success" id="vmAddFieldBtn" style="display:none">&#xFF0B; Add Field</button>
    <div id="vmSelInfo">0 selected</div>
  </div>
  <div id="vmBackupPanel">
    <label>Backup of:</label>
    <select id="vmBackupList"></select>
    <button class="vm-btn success" id="vmBackupSaveBtn">&#128190; Save backup</button>
    <button class="vm-btn" id="vmBackupRestoreBtn">&#8679; Restore selected</button>
    <button class="vm-btn danger" id="vmBackupDeleteBtn">&#128465; Delete selected</button>
  </div>
  <div id="vmAddFieldRow">
    <label>New field:</label>
    <input id="vmNewFieldKey" placeholder="key (e.g. notes)" style="width:120px"/>
    <input id="vmNewFieldLabel" placeholder="Label" style="width:120px"/>
    <select id="vmNewFieldType">
      <option value="text">text</option>
      <option value="number">number</option>
    </select>
    <select id="vmNewFieldEditable">
      <option value="admin">admin-edit</option>
      <option value="user">user-edit</option>
      <option value="false">read-only</option>
    </select>
    <button class="vm-btn success" id="vmNewFieldAddBtn">Add</button>
    <button class="vm-btn" id="vmNewFieldCancelBtn">Cancel</button>
  </div>
  <div id="vmFieldPanel">
    <h3>Columns &#8212; drag to reorder &middot; &#9673;/&#9675; show/hide &middot; width (px)</h3>
  </div>
  <div id="vmTableWrap">
    <table id="vmTable">
      <thead><tr id="vmThead"></tr></thead>
      <tbody id="vmTbody"></tbody>
    </table>
  </div>
  <div id="vmStatus">
    <div id="vmStatusLeft">No data loaded</div>
    <div id="vmStatusRight">localStorage: <span id="vmLsInfo">&#8212;</span></div>
  </div>
</div>

<!-- Admin Login Modal -->
<div id="vmLoginModal">
  <div id="vmLoginBox">
    <h3>&#128274; Admin Sign In</h3>
    <div class="vm-login-row">
      <label>Password</label>
      <input type="password" id="vmLoginPwd" placeholder="Enter admin password" autocomplete="current-password">
    </div>
    <div id="vmLoginError"></div>
    <div class="vm-login-btns">
      <button class="vm-btn" id="vmLoginCancelBtn">Cancel</button>
      <button class="vm-btn success" id="vmLoginSubmitBtn">Sign In</button>
    </div>
  </div>
</div>

<!-- Name Prompt Modal -->
<div id="vmNameModal">
  <div id="vmNameBox">
    <h3 id="vmNamePromptTitle">Enter common name</h3>
    <input id="vmNameInput" placeholder="e.g. Blue Tang" autocomplete="off"/>
    <div class="vm-name-btns">
      <button class="vm-btn" id="vmNameCancelBtn">Cancel</button>
      <button class="vm-btn success" id="vmNameOkBtn">OK</button>
    </div>
  </div>
</div>

<script>
'use strict';
// BUILD: Mar 10 23:38

// ── Date stamp in hamburger ───────────────────────────────────────────────────
(function(){
  const d=new Date();
  document.getElementById("menuDateStamp").textContent=
    "linkk build: Mar 10 23:38 | "+
    d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})+
    " "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
})();

// ── Grid ──────────────────────────────────────────────────────────────────────
const GRID_LINES=6,GRID_COLS=7,GRID_ROWS=7;
let GW,GH,cellW,cellH,isPortrait,bgColor,showCellLabels=false;
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const wrap=document.getElementById("rotateWrap");
const menuWrap=document.getElementById("menuWrap");
const menuBtn=document.getElementById("menuBtn");
const menuPanel=document.getElementById("menuPanel");
const COL_LETTERS="abcdefg";

function drawCellLabels(){
  const fs=Math.max(10,Math.floor(Math.min(cellW,cellH)*0.22));
  ctx.font="bold "+fs+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
  for(let r=1;r<=GRID_ROWS;r++) for(let c=1;c<=GRID_COLS;c++){
    const cx=(c-.5)*cellW,cy=(r-.5)*cellH,lbl=r+COL_LETTERS[c-1];
    ctx.fillStyle="rgba(0,0,0,0.35)";ctx.fillText(lbl,cx+1,cy+1);
    ctx.fillStyle="rgba(60,60,180,0.75)";ctx.fillText(lbl,cx,cy);
  }
  ctx.textAlign="left";ctx.textBaseline="alphabetic";
}
function renderGrid(){
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,GW,GH);
  ctx.strokeStyle="#000";ctx.lineWidth=1;
  for(let i=1;i<=GRID_LINES;i++){
    const x=GW*i/(GRID_LINES+1);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GH);ctx.stroke();
    const y=GH*i/(GRID_LINES+1);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GW,y);ctx.stroke();
  }
  if(showCellLabels)drawCellLabels();
}
function setupLayout(){
  const pw=window.innerWidth,ph=window.innerHeight;
  isPortrait=pw<ph;
  bgColor=Math.min(pw,ph)<600?"#7ab8e8":"#ffffff";
  if(isPortrait){
    GW=ph;GH=pw;canvas.width=GW;canvas.height=GH;
    wrap.style.cssText=`width:${GW}px;height:${GH}px;transform-origin:0 0;transform:rotate(90deg) translateY(-${pw}px)`;
  }else{
    GW=pw;GH=ph;canvas.width=GW;canvas.height=GH;
    wrap.style.cssText=`width:${GW}px;height:${GH}px;transform-origin:0 0;transform:none`;
  }
  cellW=GW/GRID_COLS;cellH=GH/GRID_ROWS;updateMenuPos();
}
function updateMenuPos(){
  const P=14;
  if(isPortrait){menuWrap.classList.add("portrait-mode");menuWrap.style.cssText+=";bottom:"+P+"px;left:"+P+"px;right:auto";}
  else{menuWrap.classList.remove("portrait-mode");menuWrap.style.cssText+=";bottom:"+P+"px;right:"+P+"px;left:auto";}
}
function closeMenu(){menuPanel.classList.remove("open");menuBtn.classList.remove("open");}

document.getElementById("miPlay").addEventListener("pointerup",e=>{e.stopPropagation();closeMenu();alert("Play \u2014 TBD");});
document.getElementById("miTables").addEventListener("pointerup",e=>{e.stopPropagation();closeMenu();vmOpen();});
document.getElementById("miHelp").addEventListener("pointerup",e=>{e.stopPropagation();closeMenu();alert("Help \u2014 coming soon");});
menuBtn.addEventListener("pointerup",e=>{e.stopPropagation();const o=menuPanel.classList.toggle("open");menuBtn.classList.toggle("open",o);});
menuPanel.addEventListener("pointerup",e=>e.stopPropagation());
document.addEventListener("pointerup",()=>{if(menuPanel.classList.contains("open"))closeMenu();});
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="l"){e.preventDefault();showCellLabels=!showCellLabels;renderGrid();}
  if((e.ctrlKey||e.metaKey)&&e.key==="t"){e.preventDefault();vmOpen();}
});

// ══════════════════════════════════════════════════════════════════════════════
// IMAGE MANAGER
// ══════════════════════════════════════════════════════════════════════════════

// SHA-256 of password. Default password: linkk
// To change: open browser console and run:
//   crypto.subtle.digest("SHA-256",new TextEncoder().encode("yourpassword"))
//     .then(b=>[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("")).then(console.log)
// Then replace ADMIN_HASH below.
const ADMIN_HASH="399c7a9b8f4f47a4d2b6044f44082a98fa7bbdc2c193f92a6c2c72db0fc37e79"; // "linkk"

let vmIsAdmin=false;

// ── Field definitions (images.json schema) ────────────────────────────────────
const VM_BASE_FIELDS=[
  {key:"display", label:"Disp",        editable:"admin", type:"text",   defWidth:52},
  {key:"img",     label:"Image",       editable:"admin", type:"text",   defWidth:200},
  {key:"cname",   label:"Common Name", editable:"admin", type:"text",   defWidth:160},
  {key:"sname",   label:"Scientific",  editable:"admin", type:"text",   defWidth:190},
  {key:"loc",     label:"Location",    editable:"admin", type:"text",   defWidth:72},
];
function vmDefaultFieldConfig(){return VM_BASE_FIELDS.map(f=>({key:f.key,visible:true,width:f.defWidth}));}
function vmFieldDef(src,key){
  const b=VM_BASE_FIELDS.find(f=>f.key===key);if(b)return b;
  if(src&&src.customFields){const c=src.customFields.find(f=>f.key===key);if(c)return c;}
  return {key,label:key,editable:false,type:"text",defWidth:100};
}
function vmAllFieldDefs(src){return [...VM_BASE_FIELDS,...(src&&src.customFields?src.customFields:[])];}

// ── Source state ──────────────────────────────────────────────────────────────
const vmSources=[];
let vmActiveIdx=0,vmSortCol=null,vmSortAsc=true;
let vmSelected=new Set(),vmLastClick=-1;
let vmFieldPanelOpen=false,vmDragKey=null;

function vmGetSource(){return vmSources[vmActiveIdx]||null;}
function vmGetVideos(){const s=vmGetSource();return s?s.videos:[];}
function vmLsKey(fn){return "lk_data_"+fn;}
function vmBkKey(fn){return "lk_bk_"+fn;}

function vmSaveLS(src){
  try{
    localStorage.setItem(vmLsKey(src.filename),JSON.stringify(
      {videos:src.videos,fieldConfig:src.fieldConfig,customFields:src.customFields||[]}
    ));vmUpdateStatus();
  }catch(e){}
}
function vmLoadLS(src){
  try{
    const raw=localStorage.getItem(vmLsKey(src.filename));if(!raw)return false;
    const d=JSON.parse(raw);
    if(d.videos)src.videos=d.videos;
    if(d.fieldConfig)src.fieldConfig=d.fieldConfig;
    if(d.customFields)src.customFields=d.customFields;
    src.fieldConfig.forEach(fc=>{if(!fc.width){const def=vmFieldDef(src,fc.key);fc.width=def.defWidth||100;}});
    return true;
  }catch(e){return false;}
}
function vmUpdateStatus(){
  let info="";
  vmSources.forEach(s=>{if(localStorage.getItem(vmLsKey(s.filename)))info+=s.label+"\u2713  ";});
  document.getElementById("vmLsInfo").textContent=info||"none";
  const src=vmGetSource();
  if(src)document.getElementById("vmStatusLeft").textContent=src.label+" \u2014 "+src.videos.length+" items";
}

// ── Open / close ──────────────────────────────────────────────────────────────
function vmOpen(){
  document.getElementById("vmOverlay").classList.add("open");
  vmRefreshAdminUI();vmRenderTabs();vmRenderFieldPanel();vmRenderTable();vmUpdateStatus();
}
function vmClose(){document.getElementById("vmOverlay").classList.remove("open");}
document.getElementById("vmCloseBtn").addEventListener("click",vmClose);

// ── Admin ─────────────────────────────────────────────────────────────────────
function vmRefreshAdminUI(){
  document.getElementById("vmAdminBadge").classList.toggle("visible",vmIsAdmin);
  document.getElementById("vmAdminLogoutBtn").style.display=vmIsAdmin?"":"none";
  document.getElementById("vmAdminLoginBtn").style.display=vmIsAdmin?"none":"";
  ["vmExportBtn","vmBackupBtn","vmResetBtn","vmFieldToggleBtn","vmAddRowBtn"].forEach(id=>{
    const el=document.getElementById(id);if(el)el.disabled=!vmIsAdmin;
  });
  document.getElementById("vmAddFieldBtn").style.display=vmIsAdmin?"":"none";
}
document.getElementById("vmAdminLoginBtn").addEventListener("click",()=>{
  document.getElementById("vmLoginModal").classList.add("open");
  document.getElementById("vmLoginPwd").value="";
  document.getElementById("vmLoginError").textContent="";
  setTimeout(()=>document.getElementById("vmLoginPwd").focus(),100);
});
document.getElementById("vmAdminLogoutBtn").addEventListener("click",()=>{
  vmIsAdmin=false;vmRefreshAdminUI();vmRenderTable();
});
document.getElementById("vmLoginCancelBtn").addEventListener("click",()=>{
  document.getElementById("vmLoginModal").classList.remove("open");
});
document.getElementById("vmLoginSubmitBtn").addEventListener("click",vmDoLogin);
document.getElementById("vmLoginPwd").addEventListener("keydown",e=>{if(e.key==="Enter")vmDoLogin();});
async function vmDoLogin(){
  const pwd=document.getElementById("vmLoginPwd").value;
  const h=await vmHashPwd(pwd);
  if(h===ADMIN_HASH){
    vmIsAdmin=true;
    document.getElementById("vmLoginModal").classList.remove("open");
    vmRefreshAdminUI();vmRenderTable();
  }else{
    document.getElementById("vmLoginError").textContent="Incorrect password.";
    document.getElementById("vmLoginPwd").select();
  }
}
async function vmHashPwd(p){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(p));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function vmRenderTabs(){
  const el=document.getElementById("vmTabs");el.innerHTML="";
  vmSources.forEach((src,i)=>{
    const b=document.createElement("button");
    b.className="vm-tab"+(i===vmActiveIdx?" active":"");
    b.textContent=src.label;
    b.addEventListener("click",()=>{
      vmActiveIdx=i;vmSelected.clear();vmSortCol=null;
      vmRenderTabs();vmRenderFieldPanel();vmRenderTable();vmUpdateStatus();

}

// ── Field panel ───────────────────────────────────────────────────────────────
function vmRenderFieldPanel(){
  const src=vmGetSource();if(!src)return;
  const panel=document.getElementById("vmFieldPanel");
  panel.innerHTML="<h3>Columns \u2014 drag to reorder \u00b7 \u25c9/\u25cb show/hide \u00b7 width (px)</h3>";
  (src.customFields||[]).forEach(cf=>{
    if(!src.fieldConfig.find(fc=>fc.key===cf.key))
      src.fieldConfig.push({key:cf.key,visible:true,width:cf.defWidth||100});
  });
  src.fieldConfig.forEach(fc=>{
    const def=vmFieldDef(src,fc.key);
    const chip=document.createElement("span");
    chip.className="vm-field-chip"+(fc.visible?" active-field":"");
    chip.draggable=true;chip.dataset.key=fc.key;
    const tog=document.createElement("span");
    tog.className="chip-toggle";tog.textContent=fc.visible?"\u25c9":"\u25cb";
    tog.addEventListener("click",e=>{
      e.stopPropagation();fc.visible=!fc.visible;
      vmSaveLS(src);vmRenderFieldPanel();vmRenderTable();
    });
    const lbl=document.createElement("span");lbl.textContent=" "+def.label;
    chip.appendChild(tog);chip.appendChild(lbl);
    if(vmIsAdmin){
      const sep=document.createElement("span");sep.style.cssText="color:#555;margin:0 2px";sep.textContent="|";
      const wi=document.createElement("input");wi.type="number";wi.className="chip-width-input";
      wi.value=fc.width||def.defWidth||100;wi.min=30;wi.max=600;wi.step=10;
      wi.addEventListener("click",e=>e.stopPropagation());
      wi.addEventListener("change",()=>{
        fc.width=Math.max(30,Math.min(600,parseInt(wi.value)||100));
        wi.value=fc.width;vmSaveLS(src);vmRenderTable();
      });
      chip.appendChild(sep);chip.appendChild(wi);
    }
    chip.addEventListener("dragstart",()=>{vmDragKey=fc.key;chip.classList.add("dragging");});
    chip.addEventListener("dragend",()=>{chip.classList.remove("dragging");vmDragKey=null;});
    chip.addEventListener("dragover",e=>{e.preventDefault();chip.classList.add("drag-over");});
    chip.addEventListener("dragleave",()=>chip.classList.remove("drag-over"));
    chip.addEventListener("drop",e=>{
      e.preventDefault();chip.classList.remove("drag-over");
      if(!vmDragKey||vmDragKey===fc.key)return;
      const fi=src.fieldConfig.findIndex(x=>x.key===vmDragKey);
      const ti=src.fieldConfig.findIndex(x=>x.key===fc.key);
      if(fi<0||ti<0)return;
      const[moved]=src.fieldConfig.splice(fi,1);src.fieldConfig.splice(ti,0,moved);
      vmSaveLS(src);vmRenderFieldPanel();vmRenderTable();
    });
    panel.appendChild(chip);
  });
}
document.getElementById("vmFieldToggleBtn").addEventListener("click",()=>{
  vmFieldPanelOpen=!vmFieldPanelOpen;
  document.getElementById("vmFieldPanel").classList.toggle("open",vmFieldPanelOpen);
  document.getElementById("vmAddFieldRow").classList.toggle("open",vmFieldPanelOpen&&vmIsAdmin);

document.getElementById("vmNewFieldAddBtn").addEventListener("click",()=>{
  const src=vmGetSource();if(!src)return;

  document.getElementById("vmNewFieldLabel").value="";
  vmRenderFieldPanel();vmRenderTable();
});

document.getElementById("vmExportBtn").addEventListener("click",()=>{

// ── Backups ───────────────────────────────────────────────────────────────────
const VM_MAX_BACKUPS=10;
function vmGetBackups(src){try{return JSON.parse(localStorage.getItem(vmBkKey(src.filename)))||[];}catch(e){return[];}}
function vmSetBackups(src,list){try{localStorage.setItem(vmBkKey(src.filename),JSON.stringify(list));}catch(e){}}
function vmPopulateBackupList(){
  const src=vmGetSource();if(!src)return;
  const sel=document.getElementById("vmBackupList");sel.innerHTML="";
  const list=vmGetBackups(src);
  if(!list.length){const o=document.createElement("option");o.textContent="(no backups yet)";sel.appendChild(o);}
  else list.forEach((bk,i)=>{const o=document.createElement("option");o.value=i;o.textContent=bk.ts;sel.appendChild(o);});
}
function vmSaveBackup(){
  const src=vmGetSource();if(!src)return;
  const ts=new Date().toISOString().slice(0,19).replace("T"," ");
  const snap=JSON.stringify({videos:src.videos,customFields:src.customFields||[]});
  const list=vmGetBackups(src);list.unshift({ts,json:snap});
  if(list.length>VM_MAX_BACKUPS)list.length=VM_MAX_BACKUPS;
  vmSetBackups(src,list);vmPopulateBackupList();alert("Backup saved: "+ts);
}
document.getElementById("vmBackupBtn").addEventListener("click",()=>{
  if(document.getElementById("vmBackupPanel").classList.toggle("open"))vmPopulateBackupList();
});
document.getElementById("vmBackupSaveBtn").addEventListener("click",vmSaveBackup);
document.getElementById("vmBackupRestoreBtn").addEventListener("click",()=>{
  const src=vmGetSource();if(!src)return;
  const sel=document.getElementById("vmBackupList");const idx=parseInt(sel.value);
  const list=vmGetBackups(src);if(!list[idx])return;
  if(!confirm("Restore backup from "+list[idx].ts+"?"))return;
  const d=JSON.parse(list[idx].json);
  if(d.videos)src.videos=d.videos;if(d.customFields)src.customFields=d.customFields;
  vmSaveLS(src);vmRenderFieldPanel();vmRenderTable();vmUpdateStatus();
  alert("Restored: "+list[idx].ts);
});
document.getElementById("vmBackupDeleteBtn").addEventListener("click",()=>{
  const src=vmGetSource();if(!src)return;
  const sel=document.getElementById("vmBackupList");const idx=parseInt(sel.value);
  const list=vmGetBackups(src);if(!list[idx])return;
  if(!confirm("Delete backup: "+list[idx].ts+"?"))return;
  list.splice(idx,1);vmSetBackups(src,list);vmPopulateBackupList();
});

// ── Reset ─────────────────────────────────────────────────────────────────────
document.getElementById("vmResetBtn").addEventListener("click",()=>{
  const src=vmGetSource();if(!src)return;
  if(!confirm("Reset '"+src.label+"' to originally fetched data?"))return;
  localStorage.removeItem(vmLsKey(src.filename));
  src.videos=JSON.parse(JSON.stringify(src._original));
  src.fieldConfig=vmDefaultFieldConfig();src.customFields=[];
  vmRenderFieldPanel();vmRenderTable();vmUpdateStatus();
});

// ── Clipboard paste to row ────────────────────────────────────────────────────
async function vmPasteToRow(src,vid,locLabel){
  let url=null;
  try{url=(await navigator.clipboard.readText()).trim();}catch(e){url=null;}
  if(!url){url=prompt("Paste image URL:",vid.img||"");if(url===null)return;url=url.trim();}
  if(!url)return;
  vid.img=url;vid.display="y";
  if(locLabel)vid.loc=locLabel;
  vmSaveLS(src);vmRenderTable();
}

// ── Table ─────────────────────────────────────────────────────────────────────
function vmVisibleFields(){
  const src=vmGetSource();if(!src)return[];
  return src.fieldConfig.filter(fc=>fc.visible).map(fc=>({...vmFieldDef(src,fc.key),_width:fc.width}));
}

function vmRenderTable(){
  const src=vmGetSource();
  const thead=document.getElementById("vmThead");
  const tbody=document.getElementById("vmTbody");
  thead.innerHTML="";tbody.innerHTML="";
  if(!src||!src.videos.length){
    tbody.innerHTML='<tr><td colspan="99" style="color:#888;padding:20px">No items. Log in as admin and use + Row to add entries.</td></tr>';
    return;
  }
  const fields=vmVisibleFields();

  // Checkbox header
  const chkTh=document.createElement("th");chkTh.className="no-sort";chkTh.style.width="32px";
  const chkAll=document.createElement("input");chkAll.type="checkbox";chkAll.title="Select all";
  chkAll.addEventListener("change",()=>{
    if(chkAll.checked)src.videos.forEach((_,i)=>vmSelected.add(i));else vmSelected.clear();
    vmRenderTable();
  });
  chkTh.appendChild(chkAll);thead.appendChild(chkTh);

  fields.forEach(f=>{
    const th=document.createElement("th");
    th.style.width=(f._width||100)+"px";th.style.maxWidth=(f._width||100)+"px";
    th.textContent=f.label;th.className="sortable";
    if(f.key===vmSortCol)th.classList.add(vmSortAsc?"sort-asc":"sort-desc");
    th.addEventListener("click",e=>{
      if(e.target.classList.contains("vm-resize-handle"))return;
      if(vmSortCol===f.key)vmSortAsc=!vmSortAsc;else{vmSortCol=f.key;vmSortAsc=true;}
      vmSortVideos(src);vmRenderTable();
    });
    const rh=document.createElement("div");rh.className="vm-resize-handle";
    rh.addEventListener("mousedown",ev=>{
      ev.preventDefault();ev.stopPropagation();rh.classList.add("resizing");
      const startX=ev.clientX,fc=src.fieldConfig.find(fc=>fc.key===f.key),startW=fc?fc.width:100;
      function onMove(me){
        const nw=Math.max(30,Math.min(600,startW+(me.clientX-startX)));
        if(fc){fc.width=nw;th.style.width=nw+"px";th.style.maxWidth=nw+"px";}
        const ci=fields.indexOf(f)+1;
        tbody.querySelectorAll("tr").forEach(tr=>{const td=tr.cells[ci];if(td){td.style.width=nw+"px";td.style.maxWidth=nw+"px";}});
      }
      function onUp(){rh.classList.remove("resizing");document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);if(fc)vmSaveLS(src);}
      document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onUp);
    });
    th.appendChild(rh);thead.appendChild(th);
  });

  if(vmSortCol)vmSortVideos(src);

  src.videos.forEach((vid,i)=>{
    const tr=document.createElement("tr");
    tr.className="vm-row"+(vmSelected.has(i)?" selected":"");
    const chkTd=document.createElement("td");
    const chk=document.createElement("input");chk.type="checkbox";chk.checked=vmSelected.has(i);
    chk.addEventListener("change",e=>{
      e.stopPropagation();
      if(chk.checked)vmSelected.add(i);else vmSelected.delete(i);
      vmUpdateSelInfo();tr.classList.toggle("selected",vmSelected.has(i));
    });
    chkTd.appendChild(chk);tr.appendChild(chkTd);
    tr.addEventListener("click",e=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="A")return;
      if(e.shiftKey&&vmLastClick>=0){const lo=Math.min(i,vmLastClick),hi=Math.max(i,vmLastClick);for(let x=lo;x<=hi;x++)vmSelected.add(x);}
      else if(e.ctrlKey||e.metaKey){if(vmSelected.has(i))vmSelected.delete(i);else vmSelected.add(i);}
      else{vmSelected.clear();vmSelected.add(i);}
      vmLastClick=i;vmRenderTable();
    });

    fields.forEach(f=>{
      const td=document.createElement("td");
      const def=vmFieldDef(src,f.key);
      td.style.width=(f._width||100)+"px";td.style.maxWidth=(f._width||100)+"px";
      const dispVal=vid[f.key]!==undefined?String(vid[f.key]):"";
      const canEdit=(def.editable==="admin"&&vmIsAdmin)||(def.editable==="user");

      if(f.key==="display"){
        const isY=dispVal.toLowerCase()==="y";
        td.textContent=isY?"y":"n";
        td.className=isY?"vm-disp-y":"vm-disp-n";
        td.title="Click to toggle";
        td.addEventListener("click",e=>{
          e.stopPropagation();
          vid.display=(dispVal.toLowerCase()==="y")?"n":"y";
          vmSaveLS(src);vmRenderTable();
        });

      }else if(f.key==="img"){
        if(dispVal){
          const a=document.createElement("a");
          a.href=dispVal;a.textContent="\uD83D\uDDBC image";a.target="_blank";a.rel="noopener";a.className="vm-img-link";
          td.appendChild(a);
          if(canEdit)td.addEventListener("dblclick",e=>{e.stopPropagation();vmStartEdit(td,vid,def,src);});
        }else{
          td.textContent="\u2014";td.style.color="#555";
          if(canEdit){td.className="editable";td.addEventListener("click",e=>{e.stopPropagation();vmStartEdit(td,vid,def,src);});}
        }

      }else if(f.key==="loc"){
        td.textContent=dispVal||"?";
        td.className="loc-cell";
        td.title="Tap to paste clipboard URL as image for this row";
        td.addEventListener("click",e=>{e.stopPropagation();vmPasteToRow(src,vid,dispVal||null);});
        if(canEdit)td.addEventListener("dblclick",e=>{e.stopPropagation();vmStartEdit(td,vid,def,src);});

      }else{
        td.textContent=dispVal||"\u2014";
        if(canEdit){
          td.className="editable";
          td.addEventListener("click",e=>{e.stopPropagation();vmStartEdit(td,vid,def,src);});
        }else{td.className="locked";}
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  vmUpdateSelInfo();
}

function vmSortVideos(src){
  if(!vmSortCol)return;
  src.videos.sort((a,b)=>{
    let av=a[vmSortCol]??"",bv=b[vmSortCol]??"";
    if(!isNaN(parseFloat(av))&&!isNaN(parseFloat(bv))){av=parseFloat(av);bv=parseFloat(bv);}
    else{av=String(av).toLowerCase();bv=String(bv).toLowerCase();}
    return vmSortAsc?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
  });
}
function vmUpdateSelInfo(){
  document.getElementById("vmSelInfo").textContent=vmSelected.size+" selected / "+vmGetVideos().length+" total";
}

// ── Inline cell editing ───────────────────────────────────────────────────────
function vmStartEdit(td,vid,field,src){
  if(td.querySelector("input"))return;
  const prev=td.textContent;td.textContent="";
  const inp=document.createElement("input");
  inp.type=field.type==="number"?"number":"text";
  inp.value=vid[field.key]!==undefined?vid[field.key]:"";
  inp.className="vm-cell-input";
  function commit(){
    let val=inp.value.trim();
    if(field.type==="number")val=val===""?undefined:parseFloat(val);
    if(val===undefined)delete vid[field.key];else vid[field.key]=val;
    vmSaveLS(src);
    td.textContent=vid[field.key]!==undefined?String(vid[field.key]):"\u2014";
    td.className="editable";
  }
  inp.addEventListener("blur",commit);
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){e.preventDefault();inp.blur();}
    if(e.key==="Escape"){td.textContent=prev;td.className="editable";}
  });
  td.appendChild(inp);inp.focus();inp.select();
}

fetch("images.json?v="+Date.now())
  .then(r=>{if(!r.ok)throw new Error("not found");return r.json();})

    };

  });

setupLayout();renderGrid();
window.addEventListener("resize",()=>{setupLayout();renderGrid();});
window.addEventListener("orientationchange",()=>{setTimeout(()=>{setupLayout();renderGrid();},350);});
